<!DOCTYPE html>
<html>
<head><title>Redirecting to Listzly...</title></head>
<body>
<p id="message">Redirecting to Listzly...</p>
<script>
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobile) {
    var params = window.location.hash || window.location.search;
    window.location.href = 'com.caplock.listzly://login-callback' + params;
  } else {
    document.getElementById('message').textContent = 'Your email has been verified. You may proceed to open the Listzly app and sign in.';
  }
</script>
</body>
</html>
